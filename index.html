<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>爱心动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            position: relative;
        }

        .heart-container {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            width: 100px;
            height: 90px;
            animation: float 8s infinite ease-in-out;
            transform-style: preserve-3d;
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 52px;
            height: 80px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff4757 100%);
            border-radius: 50px 50px 0 0;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
            box-shadow: 
                0 0 20px rgba(255, 107, 107, 0.5),
                inset -5px -5px 15px rgba(0, 0, 0, 0.2),
                inset 5px 5px 15px rgba(255, 255, 255, 0.3);
        }

        .heart::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        .heart-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.8),
                0 0 20px rgba(255, 255, 255, 0.5),
                2px 2px 4px rgba(0, 0, 0, 0.3);
            z-index: 10;
            white-space: nowrap;
            letter-spacing: 1px;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            25% {
                transform: translateY(-20px) rotate(5deg);
            }
            50% {
                transform: translateY(0) rotate(-5deg);
            }
            75% {
                transform: translateY(20px) rotate(5deg);
            }
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .heart.rotating {
            animation: float 8s infinite ease-in-out, rotate 10s infinite linear;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .heart {
                width: 80px;
                height: 72px;
            }

            .heart::before,
            .heart::after {
                width: 42px;
                height: 64px;
            }

            .heart-text {
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .heart {
                width: 60px;
                height: 54px;
            }

            .heart::before,
            .heart::after {
                width: 32px;
                height: 48px;
            }

            .heart-text {
                font-size: 10px;
            }
        }

        /* 背景装饰 */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: sparkle 3s infinite;
        }

        @keyframes sparkle {
            0%, 100% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="heart-container" id="heartContainer"></div>

    <script>
        class HeartAnimation {
            constructor() {
                this.container = document.getElementById('heartContainer');
                this.hearts = [];
                this.heartCount = 8; // 爱心数量
                this.init();
            }

            init() {
                this.createHearts();
                this.createSparkles();
                this.animate();
            }

            createHearts() {
                for (let i = 0; i < this.heartCount; i++) {
                    const heart = this.createHeart(i);
                    this.container.appendChild(heart);
                    this.hearts.push(heart);
                }
            }

            createHeart(index) {
                const heart = document.createElement('div');
                heart.className = 'heart rotating';
                
                const text = document.createElement('div');
                text.className = 'heart-text';
                text.textContent = '我爱你';
                
                heart.appendChild(text);

                // 随机初始位置
                const startX = Math.random() * window.innerWidth;
                const startY = Math.random() * window.innerHeight;
                
                heart.style.left = startX + 'px';
                heart.style.top = startY + 'px';

                // 为每个爱心设置随机的移动参数
                heart.dataset.angle = Math.random() * Math.PI * 2;
                heart.dataset.speed = 0.5 + Math.random() * 1; // 中等速度
                heart.dataset.radius = 50 + Math.random() * 100;
                heart.dataset.centerX = startX;
                heart.dataset.centerY = startY;

                return heart;
            }

            createSparkles() {
                for (let i = 0; i < 20; i++) {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle';
                    sparkle.style.left = Math.random() * window.innerWidth + 'px';
                    sparkle.style.top = Math.random() * window.innerHeight + 'px';
                    sparkle.style.animationDelay = Math.random() * 3 + 's';
                    this.container.appendChild(sparkle);
                }
            }

            animate() {
                this.hearts.forEach(heart => {
                    const time = Date.now() * 0.001;
                    const angle = parseFloat(heart.dataset.angle);
                    const speed = parseFloat(heart.dataset.speed);
                    const radius = parseFloat(heart.dataset.radius);
                    const centerX = parseFloat(heart.dataset.centerX);
                    const centerY = parseFloat(heart.dataset.centerY);

                    // 计算新位置（圆形轨迹）
                    const x = centerX + Math.cos(angle + time * speed) * radius;
                    const y = centerY + Math.sin(angle + time * speed) * radius;

                    // 边界检测
                    if (x < -100) heart.dataset.centerX = window.innerWidth + 100;
                    if (x > window.innerWidth + 100) heart.dataset.centerX = -100;
                    if (y < -100) heart.dataset.centerY = window.innerHeight + 100;
                    if (y > window.innerHeight + 100) heart.dataset.centerY = -100;

                    heart.style.left = x + 'px';
                    heart.style.top = y + 'px';
                });

                requestAnimationFrame(() => this.animate());
            }
        }

        // 页面加载完成后启动动画
        window.addEventListener('load', () => {
            new HeartAnimation();
        });

        // 处理窗口大小变化
        window.addEventListener('resize', () => {
            // 重新计算爱心位置以适应新的窗口大小
            const hearts = document.querySelectorAll('.heart');
            hearts.forEach(heart => {
                const x = parseFloat(heart.style.left);
                const y = parseFloat(heart.style.top);
                
                if (x > window.innerWidth) {
                    heart.style.left = window.innerWidth - 100 + 'px';
                }
                if (y > window.innerHeight) {
                    heart.style.top = window.innerHeight - 100 + 'px';
                }
            });
        });
    </script>
</body>
</html>
