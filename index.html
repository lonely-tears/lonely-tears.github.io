
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱心动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            position: relative;
        }

        .heart {
            position: absolute;
            width: 80px;
            height: 80px;
            transform: rotate(-45deg);
            animation: rotate 4s linear infinite;
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 64px;
            background: #ff6b6b;
            border-radius: 40px 40px 0 0;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
            box-shadow: 
                0 0 20px rgba(255, 107, 107, 0.5),
                inset -5px -5px 10px rgba(0, 0, 0, 0.2),
                inset 5px 5px 10px rgba(255, 255, 255, 0.3);
        }

        .heart::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        .heart-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.8),
                0 0 20px rgba(255, 255, 255, 0.5),
                0 0 30px rgba(255, 255, 255, 0.3);
            white-space: nowrap;
            pointer-events: none;
        }

        @keyframes rotate {
            from {
                transform: rotate(-45deg);
            }
            to {
                transform: rotate(315deg);
            }
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .heart {
                width: 60px;
                height: 60px;
            }

            .heart::before,
            .heart::after {
                width: 30px;
                height: 48px;
                border-radius: 30px 30px 0 0;
            }

            .heart-text {
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .heart {
                width: 50px;
                height: 50px;
            }

            .heart::before,
            .heart::after {
                width: 25px;
                height: 40px;
                border-radius: 25px 25px 0 0;
            }

            .heart-text {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <script>
        // 创建爱心元素
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            
            // 添加文字
            const text = document.createElement('div');
            text.className = 'heart-text';
            text.textContent = '老婆\n我爱你';
            heart.appendChild(text);
            
            // 随机初始位置
            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * window.innerHeight;
            heart.style.left = startX + 'px';
            heart.style.top = startY + 'px';
            
            // 随机颜色变化
            const colors = ['#ff6b6b', '#ff8787', '#ff5252', '#ff1744', '#e91e63'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            heart.style.setProperty('--heart-color', color);
            
            // 更新伪元素颜色
            const style = document.createElement('style');
            style.textContent = `
                .heart:nth-child(${document.querySelectorAll('.heart').length + 1})::before,
                .heart:nth-child(${document.querySelectorAll('.heart').length + 1})::after {
                    background: ${color};
                    box-shadow: 
                        0 0 20px ${color}88,
                        inset -5px -5px 10px rgba(0, 0, 0, 0.2),
                        inset 5px 5px 10px rgba(255, 255, 255, 0.3);
                }
            `;
            document.head.appendChild(style);
            
            document.body.appendChild(heart);
            
            // 随机移动
            animateHeart(heart);
        }

        // 爱心移动动画
        function animateHeart(heart) {
            let x = parseFloat(heart.style.left);
            let y = parseFloat(heart.style.top);
            let vx = (Math.random() - 0.5) * 2; // 水平速度
            let vy = (Math.random() - 0.5) * 2; // 垂直速度
            
            function move() {
                x += vx;
                y += vy;
                
                // 边界检测和反弹
                const heartSize = window.innerWidth <= 480 ? 50 : (window.innerWidth <= 768 ? 60 : 80);
                
                if (x <= 0 || x >= window.innerWidth - heartSize) {
                    vx = -vx;
                    x = Math.max(0, Math.min(window.innerWidth - heartSize, x));
                }
                
                if (y <= 0 || y >= window.innerHeight - heartSize) {
                    vy = -vy;
                    y = Math.max(0, Math.min(window.innerHeight - heartSize, y));
                }
                
                heart.style.left = x + 'px';
                heart.style.top = y + 'px';
                
                requestAnimationFrame(move);
            }
            
            move();
        }

        // 初始化创建多个爱心
        function init() {
            const heartCount = window.innerWidth <= 480 ? 8 : (window.innerWidth <= 768 ? 12 : 15);
            
            for (let i = 0; i < heartCount; i++) {
                setTimeout(() => {
                    createHeart();
                }, i * 200);
            }
        }

        // 页面加载完成后初始化
        window.addEventListener('load', init);

        // 窗口大小改变时重新调整
        window.addEventListener('resize', () => {
            // 可以在这里添加响应式调整逻辑
        });
    </script>
</body>
</html>
</html>
