
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱心动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            position: relative;
        }

        .heart {
            position: absolute;
            width: 100px;
            height: 90px;
            transform-style: preserve-3d;
            animation: rotate 4s linear infinite;
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            left: 50px;
            top: 0;
            width: 50px;
            height: 80px;
            background: linear-gradient(45deg, #ff6b6b, #ff4757);
            border-radius: 50px 50px 0 0;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
            box-shadow: 
                0 0 20px rgba(255, 71, 87, 0.5),
                inset -5px -5px 10px rgba(0, 0, 0, 0.2),
                inset 5px 5px 10px rgba(255, 255, 255, 0.3);
        }

        .heart::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        .heart-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 10;
            white-space: nowrap;
        }

        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .heart-container {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        /* 添加一些光晕效果 */
        .heart-glow {
            position: absolute;
            width: 120px;
            height: 110px;
            background: radial-gradient(circle, rgba(255, 107, 107, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            top: -10px;
            left: -10px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }
    </style>
</head>
<body>
    <div class="heart-container" id="heartContainer"></div>

    <script>
        class Heart {
            constructor(container) {
                this.container = container;
                this.element = this.createElement();
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.vx = (Math.random() - 0.5) * 2; // 水平速度
                this.vy = (Math.random() - 0.5) * 2; // 垂直速度
                this.rotationSpeed = Math.random() * 2 + 1; // 旋转速度
                this.update();
            }

            createElement() {
                const heartWrapper = document.createElement('div');
                heartWrapper.className = 'heart';
                heartWrapper.style.position = 'absolute';
                heartWrapper.style.left = '0px';
                heartWrapper.style.top = '0px';

                const glow = document.createElement('div');
                glow.className = 'heart-glow';

                const text = document.createElement('div');
                text.className = 'heart-text';
                text.textContent = '老婆，我爱你';

                heartWrapper.appendChild(glow);
                heartWrapper.appendChild(text);

                this.container.appendChild(heartWrapper);
                return heartWrapper;
            }

            update() {
                // 更新位置
                this.x += this.vx;
                this.y += this.vy;

                // 边界检测和反弹
                if (this.x <= 0 || this.x >= window.innerWidth - 100) {
                    this.vx = -this.vx;
                    this.x = Math.max(0, Math.min(window.innerWidth - 100, this.x));
                }
                if (this.y <= 0 || this.y >= window.innerHeight - 90) {
                    this.vy = -this.vy;
                    this.y = Math.max(0, Math.min(window.innerHeight - 90, this.y));
                }

                // 应用位置
                this.element.style.left = this.x + 'px';
                this.element.style.top = this.y + 'px';

                // 随机改变方向（增加随机性）
                if (Math.random() < 0.01) {
                    this.vx += (Math.random() - 0.5) * 0.5;
                    this.vy += (Math.random() - 0.5) * 0.5;
                    
                    // 限制速度
                    this.vx = Math.max(-3, Math.min(3, this.vx));
                    this.vy = Math.max(-3, Math.min(3, this.vy));
                }
            }
        }

        // 创建多个爱心
        const container = document.getElementById('heartContainer');
        const hearts = [];
        const heartCount = 8; // 爱心数量

        for (let i = 0; i < heartCount; i++) {
            setTimeout(() => {
                hearts.push(new Heart(container));
            }, i * 200); // 错开创建时间
        }

        // 动画循环
        function animate() {
            hearts.forEach(heart => {
                heart.update();
            });
            requestAnimationFrame(animate);
        }

        animate();

        // 窗口大小改变时的处理
        window.addEventListener('resize', () => {
            hearts.forEach(heart => {
                heart.x = Math.min(heart.x, window.innerWidth - 100);
                heart.y = Math.min(heart.y, window.innerHeight - 90);
            });
        });
    </script>
</body>
</html>
